<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語単語カード</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f4f8;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .card {
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .japanese,
        .reading,
        .chinese {
            font-size: 2rem;
            margin: 0.5rem 0;
        }

        .chinese {
            display: none;
            color: #666;
            font-size: 1.2rem;
        }

        .chinese.show {
            display: block;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #0052a3;
        }

        .shuffle-btn {
            background: #28a745;
        }

        .shuffle-btn:hover {
            background: #218838;
        }

        .score {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #333;">日本語単語カード</h1>
        <div class="score">
            <span id="current">1</span> / <span id="total">39</span>
        </div>

        <div class="card" onclick="showAnswer()">
            <div class="japanese" id="japanese"></div>
            <div class="reading" id="reading"></div>
            <div class="chinese" id="chinese"></div>
        </div>

        <div class="controls">
            <button onclick="previousCard()">前へ</button>
            <button onclick="showAnswer()">答えを見る</button>
            <button onclick="nextCard()">次へ</button>
            <button class="shuffle-btn" onclick="shuffleCards()">シャッフル</button>
        </div>
    </div>

    <script>
        const words = [
            // 動詞
            { japanese: "見ます", reading: "みます", chinese: "看、診斷" },
            { japanese: "探します", reading: "さがします", chinese: "尋找" },
            { japanese: "遅れます", reading: "おくれます", chinese: "晚、沒趕上（時間）" },
            { japanese: "間に合います", reading: "まにあいます", chinese: "趕上（時間）" },
            { japanese: "やります", reading: "", chinese: "做、從事" },
            { japanese: "拾います", reading: "ひろいます", chinese: "拾、撿" },
            { japanese: "連絡します", reading: "れんらくします", chinese: "聯繫" },
            { japanese: "片づきます", reading: "かたづきます", chinese: "收拾（行李）" },
            { japanese: "出します", reading: "だします", chinese: "扔、倒（垃圾）" },

            // 形容詞・形容動詞
            { japanese: "気分がいい", reading: "きぶんがいい", chinese: "舒服" },
            { japanese: "気分が悪い", reading: "きぶんがわるい", chinese: "不舒服" },

            // 名詞
            { japanese: "運動会", reading: "うんどうかい", chinese: "運動會" },
            { japanese: "盆踊り", reading: "ぼんおどり", chinese: "盂蘭盆節舞" },
            { japanese: "フリーマーケット", reading: "", chinese: "跳蚤市場" },
            { japanese: "場所", reading: "ばしょ", chinese: "場所、地點" },
            { japanese: "ボランティア", reading: "", chinese: "義工、志願者" },
            { japanese: "財布", reading: "さいふ", chinese: "錢包" },
            { japanese: "ごみ", reading: "", chinese: "垃圾" },
            { japanese: "国会議事堂", reading: "こっかいぎじどう", chinese: "國會議事堂" },
            { japanese: "平日", reading: "へいじつ", chinese: "平日" },
            { japanese: "〜弁", reading: "〜べん", chinese: "〜方言" },
            { japanese: "今度", reading: "こんど", chinese: "這次、下次" },
            { japanese: "随分", reading: "ずいぶん", chinese: "極其、相當、很" },
            { japanese: "直接", reading: "ちょくせつ", chinese: "直接" },
            { japanese: "いつでも", reading: "", chinese: "隨時" },
            { japanese: "燃えるごみ", reading: "もえるごみ", chinese: "可燃垃圾" },
            { japanese: "置き場", reading: "おきば", chinese: "放置處" },
            { japanese: "横", reading: "よこ", chinese: "旁邊" },
            { japanese: "瓶", reading: "びん", chinese: "瓶子" },
            { japanese: "缶", reading: "かん", chinese: "罐子" },
            { japanese: "ガス", reading: "", chinese: "瓦斯" },
            { japanese: "〜会社", reading: "〜がいしゃ", chinese: "〜公司" },

            // 場所を表す表現
            { japanese: "どこでも", reading: "", chinese: "在任何地方都" },
            { japanese: "だれでも", reading: "", chinese: "任何人都" },
            { japanese: "何でも", reading: "なんでも", chinese: "什麼都" },
            { japanese: "こんな〜", reading: "", chinese: "這樣的〜" },
            { japanese: "そんな〜", reading: "", chinese: "那樣的〜（離聽者較近）" },
            { japanese: "あんな〜", reading: "", chinese: "那樣的〜（離說話者和聽者都較遠）" },
            { japanese: "エドヤストア", reading: "", chinese: "江戶屋商店（虛構的商店）" }
        ];

        let currentIndex = 0;
        let shuffledWords = [...words];

        function showCard() {
            const word = shuffledWords[currentIndex];
            document.getElementById('japanese').textContent = word.japanese;
            document.getElementById('reading').textContent = word.reading;
            document.getElementById('chinese').textContent = word.chinese;
            document.getElementById('chinese').classList.remove('show');
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = shuffledWords.length;
        }

        function showAnswer() {
            document.getElementById('chinese').classList.add('show');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % shuffledWords.length;
            showCard();
        }

        function previousCard() {
            currentIndex = (currentIndex - 1 + shuffledWords.length) % shuffledWords.length;
            showCard();
        }

        function shuffleCards() {
            shuffledWords = [...words].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            showCard();
        }

        // 初期表示
        showCard();
    </script>
</body>
</html>
